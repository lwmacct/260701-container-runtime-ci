name: Maivo CI Gate Mode

on:
  workflow_dispatch:
    inputs:
      maivo_ref:
        description: Branch, tag, or SHA from lwmacct/260522-maivo
        required: true
        default: main
        type: string
      debug_tmate:
        description: Open an interactive SSH session before setup
        required: true
        default: false
        type: boolean
      debug_workload:
        description: Workload that opens tmate when debug_tmate is true
        required: true
        default: procfs-cpu
        type: string
      workload_group:
        description: Workload group to run
        required: true
        default: default
        type: choice
        options:
          - default
          - extended
          - all
          - custom
      workloads:
        description: Space-separated workloads, used when workload_group is custom
        required: false
        default: ""
        type: string

concurrency:
  group: maivo-ci-gate-mode-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOPROXY: https://goproxy.cn,direct
  GOSUMDB: sum.golang.google.cn
  BUILDTAGS: seccomp idmapped_mnt
  MAIVO_GATE_MODE: ci
  MAIVO_CI_TEST_ROOT: /tmp/maivo
  MAIVO_CI_IMAGE_CACHE_DIR: /tmp/maivo/images

jobs:
  prepare:
    name: Prepare workload matrix
    runs-on: ubuntu-24.04
    outputs:
      workloads: ${{ steps.matrix.outputs.workloads }}
    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v7.0.0

      - name: Build workload matrix
        id: matrix
        env:
          WORKLOAD_GROUP: ${{ inputs.workload_group || 'default' }}
          CUSTOM_WORKLOADS: ${{ inputs.workloads || '' }}
        run: |
          python3 - <<'PY' >>"$GITHUB_OUTPUT"
          import json
          import os
          import pathlib
          import shlex
          import sys

          root = pathlib.Path("ci/runtime/test/workloads")
          available = sorted(path.name for path in root.iterdir() if (path / "run.sh").is_file())
          groups = {
              "default": ["procfs-cpu", "procfs-memory", "seccomp-notify-concurrency"],
              "extended": [
                  "procfs-cpu",
                  "procfs-memory",
                  "seccomp-notify-concurrency",
                  "systemd-pid1",
                  "docker-in-docker",
                  "kubernetes-k3s",
              ],
              "all": available,
          }
          group = os.environ.get("WORKLOAD_GROUP", "default").strip() or "default"
          if group == "custom":
              workloads = shlex.split(os.environ.get("CUSTOM_WORKLOADS", ""))
          elif group in groups:
              workloads = groups[group]
          else:
              print(f"unknown workload_group: {group}", file=sys.stderr)
              sys.exit(2)
          if not workloads:
              print("no workloads selected", file=sys.stderr)
              sys.exit(2)
          unknown = [workload for workload in workloads if workload not in available]
          if unknown:
              print(f"unknown workloads: {', '.join(unknown)}", file=sys.stderr)
              print(f"available workloads: {', '.join(available)}", file=sys.stderr)
              sys.exit(2)
          print(f"workloads={json.dumps(workloads)}")
          PY

  runtime-test:
    name: Runtime workload / ${{ matrix.workload }}
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 7
      matrix:
        workload: ${{ fromJson(needs.prepare.outputs.workloads) }}
    env:
      MAIVO_WORKLOAD_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.workload }}
    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v7.0.0

      - name: Require private repository token
        env:
          MAIVO_REPO_TOKEN: ${{ secrets.MAIVO_REPO_TOKEN }}
        run: |
          if [[ -z "${MAIVO_REPO_TOKEN}" ]]; then
            echo "::error::Set repository secret MAIVO_REPO_TOKEN with read access to lwmacct/260522-maivo."
            exit 1
          fi

      - name: Checkout Maivo
        uses: actions/checkout@v7.0.0
        with:
          repository: lwmacct/260522-maivo
          ref: ${{ inputs.maivo_ref || 'main' }}
          path: maivo
          token: ${{ secrets.MAIVO_REPO_TOKEN }}

      - name: Open tmate session
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_tmate && matrix.workload == inputs.debug_workload }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: maivo/go.mod
          cache: false

      - name: Restore Go modules and build cache
        id: go-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: cache-warmup-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('maivo/go.sum') }}
          restore-keys: |
            cache-warmup-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.50.0
          repo-token: ${{ github.token }}

      - name: Install dependencies
        run: bash scripts/maivo-ci.sh install-dependencies

      - name: Show host capabilities
        run: bash scripts/maivo-ci.sh show-host-capabilities

      - name: Setup Maivo runtime host
        run: bash scripts/maivo-ci.sh setup-runtime-host

      - name: Verify CI gate mode
        run: bash scripts/maivo-ci.sh verify-gate

      - name: Run runtime workload
        run: bash scripts/maivo-ci.sh run-workload "${{ matrix.workload }}"

      - name: Collect logs
        if: always()
        run: bash scripts/maivo-ci.sh collect-logs

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: maivo-runtime-${{ matrix.workload }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.MAIVO_CI_TEST_ROOT }}/runs/**/*.log
          if-no-files-found: ignore

  cache-warmup:
    name: Cache warmup
    runs-on: ubuntu-24.04
    needs: runtime-test
    if: needs.runtime-test.result == 'success'
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger warm cache workflows
        env:
          GH_TOKEN: ${{ github.token }}
          MAIVO_REF: ${{ inputs.maivo_ref || 'main' }}
        run: |
          set -euo pipefail
          gh workflow run cache-warmup-go.yml --repo "${GITHUB_REPOSITORY}" --ref main -f maivo_ref="${MAIVO_REF}"
